version: "3.9"

# ============================================================
#  Nginx Load Balancer Demo — Docker Swarm
#  Created by: akumenbyq
# ============================================================

services:

  # ── App replicas ──────────────────────────────────────────
  app:
    image: swarm-demo-app:latest       # built from app/Dockerfile
    networks:
      - swarm-net
    environment:
      - CREATOR=akumenbyq
    deploy:
      replicas: 3                      # change to 5 to scale up
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1                 # roll one at a time
        delay: 10s
        failure_action: rollback
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
        reservations:
          cpus: "0.1"
          memory: 32M

  # ── Nginx load balancer ───────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    networks:
      - swarm-net
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: ingress                  # Swarm routing mesh
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager       # keep nginx on manager node

networks:
  swarm-net:
    driver: overlay
    attachable: true

configs:
  nginx_conf:
    file: ./nginx/nginx.conf
