# log_format belongs in http{} block — since conf.d files are
# included INSIDE http{}, we cannot define log_format here.
# We use the built-in "combined" format instead.

upstream app_servers {
    # Swarm DNS resolves "app" to all replica IPs automatically
    server app:8080;
}

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log combined;

    location / {
        proxy_pass         http://app_servers;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Tell the client which replica handled this request
        add_header         X-Handled-By      $upstream_addr always;
        add_header         X-Creator         "akumenbyq" always;

        proxy_connect_timeout  5s;
        proxy_read_timeout     10s;
    }

    location /health {
        return 200 '{"status":"ok","proxy":"nginx","creator":"akumenbyq"}';
        add_header Content-Type application/json;
    }
}
