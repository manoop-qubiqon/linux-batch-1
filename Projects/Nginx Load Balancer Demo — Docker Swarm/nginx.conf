upstream app_servers {
    # Docker Swarm's internal DNS resolves "app" to all replica IPs
    # Nginx round-robins across them automatically
    server app:8080;
}

server {
    listen 80;
    server_name _;

    # Logging — shows which backend handled each request
    log_format swarm_log
        '$remote_addr -> upstream:$upstream_addr '
        '[$time_local] "$request" $status '
        'upstream_response_time=$upstream_response_time';

    access_log /var/log/nginx/access.log swarm_log;

    location / {
        proxy_pass         http://app_servers;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Pass upstream (replica) IP to client as a header
        add_header         X-Handled-By      $upstream_addr always;
        add_header         X-Creator         "akumenbyq" always;

        proxy_connect_timeout  5s;
        proxy_read_timeout     10s;
    }

    # Health-check endpoint
    location /health {
        return 200 '{"status":"ok","proxy":"nginx","creator":"akumenbyq"}';
        add_header Content-Type application/json;
    }
}
